services:
  app:
    build:
      context: ..
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  celery-worker:
    build:
      context: ..
      dockerfile: app/Dockerfile
    command: celery -A app.tasks worker --loglevel=info
    env_file:
      - .env
    restart: unless-stopped
