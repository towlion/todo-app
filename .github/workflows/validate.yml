name: Validate Spec

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/checkout@v4
        with:
          repository: towlion/platform
          path: _platform

      - name: Run spec validator
        run: python _platform/validator/validate.py --tier 2 --dir .
